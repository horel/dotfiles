env:
  TERM: xterm-256color

window:
  # Window dimensions (changes require restart)
  #
  # Specified in number of columns/lines, not pixels.
  # If both are `0`, this setting is ignored.
  dimensions:
    columns: 110
    lines: 35

  # Window position (changes require restart)
  #
  # Specified in number of pixels.
  # If the position is not set, the window manager will handle the placement.
  position:
    x: 350
    y: 80

  padding:
    x: 0
    y: 0

  offset:
    x: 0
    y: 0

font:
  normal:
    family: monospace
    style: Regular
  bold:
    family: monospace
    style: Bold
  italic:
    family: monospace
    style: Italic
  bold_italic:
    family: monospace
    style: Bold Italic

  size: 14.0

background_opacity: 0.95

# Colors (Pencil Dark)
colors:
  # Default Colors
  primary:
    background: '#212121'
    foreground: '#B3B1AD'
  # Normal colors
  normal:
    black:   '#212121'
    red:     '#c30771'
    green:   '#10a778'
    yellow:  '#a89c14'
    blue:    '#008ec4'
    magenta: '#523c79'
    cyan:    '#20a5ba'
    white:   '#C7C7C7'
  # Bright colors
  bright:
      #black:   '#212121'
      #black:   '#566270'
      #black:   '#52616a'
      #black:   '#3e4149'
    black:   '#454552'
    red:     '#fb007a'
    green:   '#5fd7af'
    yellow:  '#f3e430'
    blue:    '#20bbfc'
    magenta: '#6855de'
    cyan:    '#4fb8cc'
    white:   '#FFFFFF'
